name: DateTimeChecker — Full Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:

  # ─────────────────────────────────────────
  # Topic 1 — Unit Tests (NUnit)
  # ─────────────────────────────────────────
  unit-tests:
    name: "Topic 1 — Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        working-directory: "Unit test/DateTimeChecker"
        run: dotnet build --configuration Release

      - name: Run NUnit Tests
        working-directory: "Unit test/DateTimeChecker"
        run: dotnet test --configuration Release --logger "trx;LogFileName=unit-results.trx" --results-directory ./TestResults

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "Unit test/DateTimeChecker/TestResults/*.trx"


  # ─────────────────────────────────────────
  # Topic 2 — API Tests (start API, run curl checks)
  # ─────────────────────────────────────────
  api-tests:
    name: "Topic 2 — API Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build API
        working-directory: "API test/DateTimeCheckerAPI"
        run: dotnet build --configuration Release

      - name: Start API in background
        working-directory: "API test/DateTimeCheckerAPI"
        run: |
          dotnet run --configuration Release &
          sleep 5  # wait for API to be ready

      - name: Health check
        run: |
          curl -f http://localhost:5000/health

      - name: Valid date returns 200
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:5000/validate-date \
            -H "Content-Type: application/json" \
            -d '{"day":"15","month":"6","year":"2024"}')
          echo "Status: $RESPONSE"
          [ "$RESPONSE" = "200" ] || exit 1

      - name: Invalid date returns 400
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:5000/validate-date \
            -H "Content-Type: application/json" \
            -d '{"day":"31","month":"4","year":"2024"}')
          echo "Status: $RESPONSE"
          [ "$RESPONSE" = "400" ] || exit 1

      - name: Leap year valid (29 Feb 2024)
        run: |
          BODY=$(curl -s -X POST http://localhost:5000/validate-date \
            -H "Content-Type: application/json" \
            -d '{"day":"29","month":"2","year":"2024"}')
          echo "Response: $BODY"
          echo "$BODY" | grep -q '"isValid":true' || exit 1

      - name: Non-leap year invalid (29 Feb 2023)
        run: |
          BODY=$(curl -s -X POST http://localhost:5000/validate-date \
            -H "Content-Type: application/json" \
            -d '{"day":"29","month":"2","year":"2023"}')
          echo "Response: $BODY"
          echo "$BODY" | grep -q '"isValid":false' || exit 1


  # ─────────────────────────────────────────
  # Topic 3 — Web E2E Tests (Playwright)
  # ─────────────────────────────────────────
  e2e-tests:
    name: "Topic 3 — Web E2E Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start API in background
        working-directory: "API test/DateTimeCheckerAPI"
        run: |
          dotnet run --configuration Release &
          sleep 5

      - name: Install npm dependencies
        working-directory: "Web E2E/DateTimeCheckerE2E"
        run: npm install

      - name: Install Playwright browsers
        working-directory: "Web E2E/DateTimeCheckerE2E"
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: "Web E2E/DateTimeCheckerE2E"
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: "Web E2E/DateTimeCheckerE2E/playwright-report/"


  # ─────────────────────────────────────────
  # Allure Report (aggregates all results)
  # ─────────────────────────────────────────
  allure-report:
    name: "Allure Report"
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, e2e-tests]
    if: always()   # run even if tests fail
    steps:
      - uses: actions/checkout@v4

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/unit

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: allure-results/e2e

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
